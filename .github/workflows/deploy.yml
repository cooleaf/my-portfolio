name: Deploy to Tencent COS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install & Build
        run: |
          npm ci
          npm run build
          
      - name: Install coscmd
        run: pip install coscmd
        
      - name: Configure coscmd
        run: |
          coscmd config \
            -a ${{ secrets.TENCENT_SECRET_ID }} \
            -s ${{ secrets.TENCENT_SECRET_KEY }} \
            -b ${{ secrets.COS_BUCKET }} \
            -r ${{ secrets.COS_REGION }}
          
      - name: Deploy to COS
        run: coscmd upload -rfs --delete ./dist /
