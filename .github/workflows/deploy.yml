name: Deploy to Tencent Cloud COS

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build
      run: npm run build
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Tencent Cloud CLI
      run: |
        pip install tccli
        tccli configure set secretId ${{ secrets.TENCENT_SECRET_ID }}
        tccli configure set secretKey ${{ secrets.TENCENT_SECRET_KEY }}
        tccli configure set region ${{ secrets.COS_REGION }}
        
    - name: Deploy to COS
      run: |
        tccli cos upload-r \
          --Bucket ${{ secrets.COS_BUCKET }} \
          --Region ${{ secrets.COS_REGION }} \
          --LocalPath ./dist \
          --CosPath / \
          --Recursive
