name: Test Secrets

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test Secrets
        run: |
          echo "Testing Secrets..."
          echo "COS_BUCKET: ${{ secrets.COS_BUCKET }}"
          echo "COS_REGION: ${{ secrets.COS_REGION }}"
          echo "SECRET_ID length: ${#{{ secrets.TENCENT_SECRET_ID }}}"
          echo "SECRET_KEY length: ${#{{ secrets.TENCENT_SECRET_KEY }}}"
          
      - name: Test COS Connection
        run: |
          pip install coscmd
          coscmd config \
            -a ${{ secrets.TENCENT_SECRET_ID }} \
            -s ${{ secrets.TENCENT_SECRET_KEY }} \
            -b ${{ secrets.COS_BUCKET }} \
            -r ${{ secrets.COS_REGION }}
          coscmd list
